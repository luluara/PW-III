<h3>Forma de Pagamento</h3> 
<br> 

<label> 
    <input type="radio" name="pagamento" value="vista" checked onclick="toggleParcelas()"> <!-- opção de pagamento a vista -->
    À Vista
</label>

<label>
    <input type="radio" name="pagamento" value="prazo" onclick="toggleParcelas()"> <!-- opção de pagamento a prazo -->
    A Prazo
</label>

<br><br>

Quantidade de Parcelas: 
<select id="parcelas" disabled>
    <!-- Opção parcelas --> 
    <option value="2">2</option> 
    <option value="3">3</option> 
    <option value="4">4</option> 
    <option value="5">5</option> 
</select>

<br><br>

<button onclick="calcular()">Calcular</button> 

<div class="resultado" id="resultado"></div> 

<script> 

function toggleParcelas() { 
    const prazo = document.querySelector('input[value="prazo"]').checked; 
    document.getElementById("parcelas").disabled = !prazo; // Habilita ou desabilita o select
}

function calcular() { // Função de cálculo

    let total = 0; // Variável p total

    const linhas = document.querySelectorAll("table tr"); 

    linhas.forEach((linha, index) => { 
        if (index === 0) return; 

        const checkbox = linha.querySelector(".produto");
        const quantidade = linha.querySelector("input[type='number']").value; 

        if (checkbox.checked) { 
            const preco = parseFloat(checkbox.dataset.preco); // converte preço para número
            total += preco * quantidade; 
        }
    });

    if (total === 0) { // nenhum produto foi escolhido
        document.getElementById("resultado").innerHTML = "Selecione algum produto."; 
        return; 
    }

    const pagamento = document.querySelector('input[name="pagamento"]:checked').value; 
    let resultadoTexto = ""; 

    if (pagamento === "vista") { 
        let desconto = total * 0.085; //desconto
        let totalFinal = total - desconto; 

        resultadoTexto = `
            Total: R$ ${total.toFixed(2)} <br>
            Desconto: R$ ${desconto.toFixed(2)} <br>
            Total à vista: R$ ${totalFinal.toFixed(2)}
        `; 
    } else { // pagamento a prazo

        let parcelas = parseInt(document.getElementById("parcelas").value);

        let totalComJuros = total + (total * 0.06) + (parcelas * 6.90); // juros 
        let valorParcela = totalComJuros / parcelas;

        if (valorParcela < 10) { 
            document.getElementById("resultado").innerHTML =
                "Erro: parcela não pode ser menor que R$ 10,00."; // se valor menor que 10
            return; // Interrompe execução
        }

        resultadoTexto = `
            Total: R$ ${total.toFixed(2)} <br>
            Total com juros: R$ ${totalComJuros.toFixed(2)} <br>
            Parcelas: ${parcelas}x de R$ ${valorParcela.toFixed(2)}
        `; // Monta resultado final
    }

    document.getElementById("resultado").innerHTML = resultadoTexto; 
}

</script>
